<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogue</title>
  <link rel="stylesheet" href="css/catalogue.css">
</head>
<body>
  <header class="container">
    <a href="index.html" class="header-logo">
      <img src="img/logo.svg" alt="logo">
      <h1>FASHION</h1>
    </a>
    <nav class="header-nav">
      <a href="catalogue.html" class="nav-link nav-link-active">
        CATALOGUE
      </a>
      <a href="fashion.html" class="nav-link">
        FASHION
      </a>
      <a href="favourite.html" class="nav-link">
        FAVOURITE
      </a>
      <a href="lifestyle.html" class="nav-link">
        LIFESTYLE
      </a>
      <a href="login.html" class="btn-login">
        Login
      </a>
      <a href="register.html" class="btn-register">
        Register
      </a>
    </nav>
  </header>
  <main class="main-grow">
    <div class="cat-header">
      <h2 class="cat-title">Product 
        <span class="cat-title-rotate">Catalogue</span>
      </h2>
      <div class="cat-filters">
        <select class="filter-select">
          <option value="1">All</option>
          <option value="2">Hoodies</option>
          <option value="3">Coats</option>
          <option value="4">Tees</option>
        </select>
        <select class="filter-select">
          <option value="1">Sort By:Newest</option>
          <option value="2">Price By:Low to High</option>
          <option value="3">Price By:High yo low</option>
        </select>
      </div>
    </div>


    
  </main>
</body>
</html>
